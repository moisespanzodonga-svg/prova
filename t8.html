<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOO28 – Fundamentos do CSS Moderno</title>

  <!-- ESTILOS GERAIS -->
  <style>
    :root {
      --primary: #047857;
      --secondary: #10b981;
      --dark: #064e3b;
      --light: #f9fafb;
      --gray: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      background-color: var(--light);
      color: var(--dark);
      line-height: 1.6;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 1.5rem 1rem;
    }

    .header-container {
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      height: 60px;
    }

    .titulo-header {
      text-align: center;
    }

    /* MENU */
    nav {
      background-color: var(--primary);
      padding: 10px;
      text-align: center;
    }

    .menu-principal {
      position: relative;
      display: inline-block;
    }

    .menu-principal button {
      background-color: var(--secondary);
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: var(--secondary);
      border-radius: 8px;
      min-width: 220px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .submenu a {
      display: block;
      padding: 12px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .submenu a:hover {
      background-color: var(--primary);
    }

    .menu-principal:hover .submenu {
      display: block;
    }

    /* SEÇÕES */
    section {
      max-width: 900px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h2 {
      color: var(--primary);
      margin-bottom: 1rem;
    }

    h1{


        text-align: center;
    }

    p {
      margin-bottom: 1rem;
    color:#111827;
      text-align: center;
    }

    pre {
      background: #111827;
      color: #e5e7eb;
      padding: 1rem;
      border-radius: 12px;
      overflow-x: auto;
      margin: 1rem 0;
    }

    code {
      background: #f3f4f6;
      padding: 4px 6px;
      border-radius: 6px;
    }

    .box {
      border-left: 20px solid var(--primary);
      padding: 1rem;
      background: #ecfdf5;
      border-radius: 10px;
      margin: 1rem 0;
    }


    /* RESPONSIVO */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 10px;
      }
    }


     footer {
      background-color:#10b981;
      text-align: center;
      padding: 30px;
      color: #ffffff;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- CABEÇALHO -->
  <header>
    <div class="header-container">
      <img src="imagem/voo28.jpg" class="logo" alt="VOO28">
      <div class="titulo-header">
        <h1>VOO28</h1>
        <p>Agenciamento Artístico & Produção Musical</p>
      </div>
      <img src="imagem/voo28.jpg" class="logo" alt="VOO28">
    </div>
  </header>

  <!-- MENU -->
  <nav>
    <div class="menu-principal">
      <button>MENU</button>
      <div class="submenu">
        <a href="home.html">Home</a>
        <a href="trimestre1.html">1º Trimestre</a>
        <a href="trimestre2.html">2º Trimestre</a>
        <a href="trimestre3.html">3º Trimestre</a>
        <a href="final.html">Final</a>
      </div>
    </div>
  </nav>
