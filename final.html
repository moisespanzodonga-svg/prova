<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOO28 – Agenciamento Artístico</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      color: #064e3b;
    }

    header {
      background-color: #065f46;
      padding: 10px;
      color: #ffffff;
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: auto;
    }

    .logo {
      width: 100px;
      height: auto;
      height: 60px;
    }

    .titulo-header {
      text-align: center;
      flex: 1;
    }

    nav {
      background-color: #047857;
      text-align: center;
      padding: 10px;
    }

    .menu-principal {
      display: inline-block;
      position: relative;
    }

    .menu-principal button {
      background-color: #047857;
      color: #ffffff;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .menu-principal button:hover {
      background-color: #065f46;
    }

    .submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background-color: #10b981;
      border-radius: 6px;
      min-width: 200px;
      flex-direction: column;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .submenu a {
      display: block;
      padding: 12px 20px;
      color: #ffffff;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }

    .submenu a:hover {
      background-color: #065f46;
    }

    .menu-principal:hover .submenu {
      display: flex;
    }

    h2 {
      color: #047857;
    }

    .botao-voltar {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background-color: #10b981;
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .botao-voltar:hover {
      background-color: #065f46;
    }

    footer {
      background-color: #065f46;
      text-align: center;
      padding: 20px;
      color: #ffffff;
      margin-top: 40px;
    }

    /* ── conteúdo principal ── */
    .container-principal {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 30px;
      padding: 40px 20px;
      max-width: 1100px;
      margin: auto;
      flex-wrap: wrap;
    }

    /* ── formulário ── */
    .container-formulario {
      border: 1px solid rgb(224, 223, 223);
      width: 400px;
    }

    .formulario {
      width: 100%;
      background-color: #047857;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 30px 0;
    }

    .container-input {
      width: 80%;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .container-input label {
      color: #ffffff;
      font-size: 14px;
    }

    .container-input input {
      height: 32px;
      width: 100%;
      padding: 0 8px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
    }

    .formulario button {
      width: 80%;
      height: 32px;
      background-color: #10b981;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 4px;
    }

    .formulario button:hover {
      background-color: #065f46;
    }

    /* ── tabela ── */
    .container-tabela {
      border: 1px solid rgb(224, 223, 223);
      flex: 1;
      min-width: 320px;
      align-self: flex-start;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background-color: #047857;
    }

    thead th {
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: #ffffff;
      border-bottom: 2px solid #065f46;
    }

    tbody tr {
      border-bottom: 1px solid rgb(224, 223, 223);
    }

    tbody tr:hover {
      background-color: #f0fdf4;
    }

    tbody td {
      padding: 8px 12px;
      color: #064e3b;
    }

    .aprovado {
      color: #047857;
      font-weight: bold;
    }

    .reprovado {
      color: #dc2626;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .container-principal {
        flex-direction: column;
        align-items: center;
      }
      .container-formulario,
      .container-tabela {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <img src="imagem/voo28.jpg" alt="Logo VOO28" class="logo">
      <div class="titulo-header">
        <h1>VOO28</h1>
        <p>Agenciamento Artístico & Produção Musical</p>
      </div>
      <img src="imagem/voo28.jpg" alt="Logo VOO28" class="logo">
    </div>
  </header>

  <nav>
    <div class="menu-principal">
      <button>MENU</button>
      <div class="submenu">
        <a href="home.html">Home</a>
        <a href="trimestre1.html">1º Trimestre</a>
        <a href="trimestre2.html">2º Trimestre</a>
        <a href="trimestre3.html">3º Trimestre</a>
        <a href="final.html">Final</a>
      </div>
    </div>
  </nav>

  <div class="container-principal">

    <div class="container-formulario">
      <form class="formulario" onsubmit="salvar(event)">
        <div class="container-input">
          <label for="nome_curso">Nome do Curso</label>
          <input type="text" id="nome_curso" required />
        </div>
        <div class="container-input">
          <label for="nome_aluno">Nome do Aluno</label>
          <input type="text" id="nome_aluno" required />
        </div>
        <div class="container-input">
          <label for="mac">MAC</label>
          <input type="number" id="mac" min="0" max="20" required />
        </div>
        <div class="container-input">
          <label for="pp">PP</label>
          <input type="number" id="pp" min="0" max="20" required />
        </div>
        <div class="container-input">
          <label for="pe">PE</label>
          <input type="number" id="pe" min="0" max="20" required />
        </div>
        <button type="submit">Salvar</button>
      </form>
    </div>

    <div class="container-tabela">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>MAC</th>
            <th>PP</th>
            <th>PE</th>
            <th>OBS</th>
          </tr>
        </thead>
        <tbody id="tabela-corpo"></tbody>
      </table>
    </div>

  </div>

  <footer>
    <p>&copy; 2025 VOO28 – Agenciamento Artístico & Produção Musical</p>
  </footer>

  <script>
    function salvar(evento) {
      evento.preventDefault();

      const nome = document.getElementById("nome_aluno").value;
      const mac = Number(document.getElementById("mac").value);
      const pp = Number(document.getElementById("pp").value);
      const pe = Number(document.getElementById("pe").value);

      const media = (mac + pp + pe) / 3;

      let obs;
      if (media >= 10) {
        obs = "Aprovado";
      } else {
        obs = "Reprovado";
      }

      const tbody = document.getElementById("tabela-corpo");
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${nome}</td>
        <td>${mac}</td>
        <td>${pp}</td>
        <td>${pe}</td>
        <td class="${media >= 10 ? 'aprovado' : 'reprovado'}">${obs}</td>
      `;

      tbody.appendChild(tr);
      evento.target.reset();
    }
  </script>

</body>
</html>
